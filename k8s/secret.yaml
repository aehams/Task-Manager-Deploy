apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: task-manager
type: Opaque
data:
  # base64 encoded values
  # postgres = cG9zdGdyZXM=
  # supersecretpassword = c3VwZXJzZWNyZXRwYXNzd29yZA==
  postgres-user: cG9zdGdyZXM=
  postgres-password: c3VwZXJzZWNyZXRwYXNzd29yZA==
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: task-manager
type: Opaque
data:
  # supersecretpassword = c3VwZXJzZWNyZXRwYXNzd29yZA==
  db-password: c3VwZXJzZWNyZXRwYXNzd29yZA==
